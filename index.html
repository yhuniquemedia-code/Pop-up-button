<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21-Day Study Habit System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Reset & fonts */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body { background:#fdfdfd; color:#333; line-height:1.6; overflow-x:hidden; }

/* Hero Section */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}
.hero h1 {
  font-size:2.8rem;
  margin-bottom:20px;
  opacity:0;
  transform: translateY(20px);
  animation:fadeInUp 1s forwards;
}
.hero p {
  font-size:1.2rem;
  margin-bottom:30px;
  max-width:600px;
  opacity:0;
  transform: translateY(20px);
  animation:fadeInUp 1s forwards;
  animation-delay:0.3s;
}

/* CTA Button */
#getNowBtn {
  padding:15px 30px;
  font-size:1.2rem;
  font-weight:700;
  color:#fff;
  background:#ff4b2b;
  border:none;
  border-radius:50px;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  animation: pulse 2s infinite;
}
#getNowBtn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* Email Popup Overlay */
#emailPopup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* Popup Content */
#emailPopup .popup-content {
  background:#fff;
  padding:40px 30px;
  border-radius:12px;
  max-width:400px;
  width:90%;
  text-align:center;
  transform:scale(0.8);
  opacity:0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
#emailPopup.show .popup-content {
  transform:scale(1);
  opacity:1;
}

#emailPopup h2 { font-size:1.8rem; margin-bottom:20px; }
#emailPopup .ml-embedded { margin-top:10px; }

/* Animations */
@keyframes fadeInUp {
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<!-- Hero Section -->
<section class="hero">
  <h1>End the Homework Battles in Just 21 Days!</h1>
  <p>Discover the 21-Day Study Habit System designed for Nigerian parents to help their children study willingly without shouting or punishment.</p>
  <button id="getNowBtn">Get My 21-Day Study System</button>
</section>

<!-- Email Popup -->
<div id="emailPopup">
  <div class="popup-content">
    <h2>Subscribe to Get the 21-Day Study System</h2>
    <!-- MailerLite Embed -->
    <div class="ml-embedded" data-form="a6YI6u"></div>
  </div>
</div>

<!-- MailerLite Universal -->
<script>
(function(w,d,e,u,f,l,n){
  w[f]=w[f]||function(){(w[f].q=w[f].q||[]).push(arguments);};
  l=d.createElement(e); l.async=1; l.src=u;
  n=d.getElementsByTagName(e)[0]; n.parentNode.insertBefore(l,n);
})(window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
ml('account', '2196656');
</script>

<!-- Popup Script -->
<script>
const getNowBtn = document.getElementById('getNowBtn');
const emailPopup = document.getElementById('emailPopup');

// Wait until MailerLite is ready
function waitForMailerLite(callback){
  if(typeof ml !== 'undefined' && ml && ml.forms){
    callback();
  } else {
    setTimeout(()=> waitForMailerLite(callback), 50);
  }
}

// Show popup and display MailerLite form
function showPopup() {
  emailPopup.style.display = 'flex';
  setTimeout(()=> { emailPopup.classList.add('show'); }, 10);

  waitForMailerLite(() => {
    ml('forms', 'a6YI6u', 'show'); // show MailerLite form
  });
}

// CTA click
getNowBtn.addEventListener('click', showPopup);

// Close popup if clicking outside
emailPopup.addEventListener('click', (e)=>{
  if(e.target===emailPopup){
    emailPopup.classList.remove('show');
    setTimeout(()=>{ emailPopup.style.display='none'; }, 300);
  }
});
</script>

</body>
</html>
