<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21-Day Study Habit System</title>
<style>
  /* Basic Reset */
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f7f1ff, #cfd8f7);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    background: white;
    padding: 50px 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    max-width: 500px;
    width: 90%;
    position: relative;
    z-index: 2;
  }

  h1 {
    font-size: 2em;
    color: #4a148c;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.1em;
    color: #333;
    margin-bottom: 30px;
  }

  /* Button */
  #getNowBtn {
    background: #ff6f00;
    color: white;
    font-size: 1.2em;
    font-weight: bold;
    padding: 15px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  #getNowBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  }

  /* Overlay & Popup */
  #overlay {
    display: none;
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(3px);
    z-index: 1;
  }

  #emailPopup {
    display: none;
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    z-index: 2;
    transition: all 0.4s ease;
  }

  #emailPopup.show {
    transform: translate(-50%, -50%) scale(1);
  }

  #emailPopup input[type="email"] {
    padding: 12px;
    width: 100%;
    margin-bottom: 20px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1em;
  }

  #emailPopup button {
    background: #4a148c;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 50px;
    font-size: 1em;
    cursor: pointer;
    transition: transform 0.2s;
  }

  #emailPopup button:hover {
    transform: scale(1.05);
  }

  /* Small animation for heading */
  h1 {
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    100% { transform: translateY(-10px); }
  }
</style>
</head>
<body>

<div class="container">
  <h1>End Homework Battles in 21 Days!</h1>
  <p>Get your child to study willingly with the proven 21-Day Study Habit System.</p>
  <button id="getNowBtn">Get My 21-Day Study System</button>
</div>

<div id="overlay"></div>

<div id="emailPopup">
  <form id="emailForm">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Send Me Access</button>
  </form>
</div>

<script>
const getNowBtn = document.getElementById('getNowBtn');
const emailPopup = document.getElementById('emailPopup');
const overlay = document.getElementById('overlay');
const emailForm = document.getElementById('emailForm');

// Show popup
getNowBtn.addEventListener('click', () => {
  emailPopup.classList.add('show');
  overlay.style.display = 'block';
});

// Hide popup if overlay clicked
overlay.addEventListener('click', () => {
  emailPopup.classList.remove('show');
  overlay.style.display = 'none';
});

// Form submission
emailForm.addEventListener('submit', function(e){
  e.preventDefault();
  const email = this.email.value;

  // TODO: send email to your email platform here
  console.log('Email submitted:', email);

  // ===== REPLACE THIS LINK WITH YOUR SALES PAGE =====
  window.location.href = "https://yhuniquemedia-code.github.io/study-habit-systems/";
  // ===================================================
});
</script>

</body>
</html>
