  <title>21-Day Study Habit System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & fonts */
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { background:#fdfdfd; color:#333; line-height:1.6; overflow-x:hidden; }

    /* Hero Section */
    .hero {
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:0 20px;
    }
    .hero h1 {
      font-size:2.8rem;
      margin-bottom:20px;
      opacity:0;
      transform: translateY(20px);
      animation:fadeInUp 1s forwards;
    }
    .hero p {
      font-size:1.2rem;
      margin-bottom:30px;
      max-width:600px;
      opacity:0;
      transform: translateY(20px);
      animation:fadeInUp 1s forwards;
      animation-delay:0.3s;
    }

    /* CTA Button */
    #getNowBtn {
      padding:15px 30px;
      font-size:1.2rem;
      font-weight:700;
      color:#fff;
      background:#ff4b2b;
      border:none;
      border-radius:50px;
      cursor:pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    #getNowBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* Popup Overlay */
    #emailPopup {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    /* Popup Content */
    #emailPopup .popup-content {
      background:#fff;
      padding:40px 30px;
      border-radius:12px;
      max-width:450px;
      width:90%;
      text-align:center;
      transform:scale(0.8);
      opacity:0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    #emailPopup.show .popup-content {
      transform:scale(1);
      opacity:1;
    }

    /* Animations */
    @keyframes fadeInUp {
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1>End the Homework Battles in Just 21 Days!</h1>
    <p>Discover the 21-Day Study Habit System designed for Nigerian parents to help their children study willingly without shouting or punishment.</p>
    <button id="getNowBtn">Get My 21-Day Study System</button>
  </section>

  <!-- Email Popup -->
  <div id="emailPopup">
    <div class="popup-content">
      <h2>Subscribe to Get the 21-Day Study System</h2>

      <!-- End MailerLite Embedded Form -->

      <p style="margin-top:10px; font-size:0.9em;">Subscribe to get more tips on helping your child study.</p>
    </div>
  </div>
