<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21-Day Study Habit System</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f0f4f8;
    margin: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow-x: hidden;
  }

  .container {
    text-align: center;
    padding: 20px;
    max-width: 700px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 20px;
    color: #222;
  }

  p {
    font-size: 1.1rem;
    margin-bottom: 30px;
    line-height: 1.6;
    color: #555;
  }

  #getNowBtn {
    padding: 15px 35px;
    font-size: 1.2rem;
    background: #ff6b6b;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    animation: pulse 1.5s infinite;
  }

  #getNowBtn:hover {
    transform: scale(1.1);
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* Overlay */
  #overlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(3px);
    z-index: 1;
  }

  /* Popup */
  #emailPopup {
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    z-index: 2;
    transition: all 0.4s ease;
    opacity: 0;
    width: 90%;
    max-width: 400px;
    text-align: center;
  }

  #emailPopup.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  #emailPopup h2 {
    margin-bottom: 20px;
    font-size: 1.5rem;
    color: #222;
  }

  #emailPopup input[type="email"] {
    width: 80%;
    padding: 12px 10px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
  }

  #emailPopup button {
    padding: 12px 25px;
    font-size: 1rem;
    border-radius: 10px;
    border: none;
    background: #1dd1a1;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #emailPopup button:hover {
    transform: scale(1.05);
  }
</style>
</head>
<body>

<div class="container">
  <h1>End the Homework Battles in 21 Days!</h1>
  <p>Discover the 21-Day Study Habit System that helps Nigerian parents get their children to study willingly — without shouting, threats, or punishment.</p>
  <button id="getNowBtn">Get My 21-Day Study System</button>
</div>

<!-- Overlay -->
<div id="overlay"></div>

<!-- Email Popup -->
<div id="emailPopup">
  <h2>Enter Your Email</h2>
  <form id="emailForm">
    <input type="email" name="email" placeholder="Enter your email" required>
    <br>
    <button type="submit">Submit</button>
  </form>
</div>

<script>
  const getNowBtn = document.getElementById('getNowBtn');
  const emailPopup = document.getElementById('emailPopup');
  const overlay = document.getElementById('overlay');
  const emailForm = document.getElementById('emailForm');

  // Show popup on button click
  getNowBtn.addEventListener('click', () => {
    emailPopup.classList.add('show');
    overlay.style.display = 'block';
  });

  // Close popup if overlay clicked
  overlay.addEventListener('click', () => {
    emailPopup.classList.remove('show');
    overlay.style.display = 'none';
  });

  // Handle form submission
  emailForm.addEventListener('submit', function(e){
    e.preventDefault();
    const email = this.email.value;

    // TODO: Send email to your platform (Mailchimp, ConvertKit, Selar, etc.)
    // Example:
    // fetch('https://your-email-platform.com/add', { method:'POST', body: { email } });

    // Redirect to your sales page
    window.location.href = "https://yhuniquemedia-code.github.io/study-habit-systems/"; // <-- REPLACE with your real sales page link
  });
</script>

</body>
</html>
