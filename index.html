<!-- MICRO-COMMITMENT BUTTON -->
<div class="micro-commitment-container">
  <button id="getNowBtn" class="micro-btn">
    Get My 21-Day Study System
  </button>
</div>

<!-- EMAIL POPUP -->
<div id="emailPopup" class="popup-overlay">
  <div class="popup-content">
    <h2>Enter Your Email to Get Started</h2>
    <form id="emailForm">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit" class="submit-btn">Submit</button>
    </form>
    <span class="close-popup" id="closePopup">&times;</span>
  </div>
</div>

<!-- STYLES -->
<style>
/* Center button */
.micro-commitment-container {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 150px;
}

/* Button styling & animation */
.micro-btn {
  padding: 20px 40px;
  font-size: 22px;
  font-weight: bold;
  background: #ff6f61;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.micro-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Popup overlay */
.popup-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none; /* hidden by default */
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeIn 0.5s ease;
}

/* Popup content box */
.popup-content {
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  position: relative;
  animation: zoomIn 0.4s ease;
}

.popup-content h2 {
  margin-bottom: 20px;
}

.popup-content input[type="email"] {
  width: 80%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.submit-btn {
  padding: 12px 25px;
  font-size: 18px;
  background: #ff6f61;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.submit-btn:hover {
  transform: scale(1.05);
}

.close-popup {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 24px;
  cursor: pointer;
  color: #333;
}

/* Animations */
@keyframes zoomIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
</style>

<!-- SCRIPT -->
<script>
// Elements
const getNowBtn = document.getElementById('getNowBtn');
const emailPopup = document.getElementById('emailPopup');
const closePopup = document.getElementById('closePopup');
const emailForm = document.getElementById('emailForm');

// Show popup when button clicked
getNowBtn.addEventListener('click', () => {
  emailPopup.style.display = 'flex';
});

// Close popup
closePopup.addEventListener('click', () => {
  emailPopup.style.display = 'none';
});

// Close if clicked outside content
window.addEventListener('click', (e) => {
  if (e.target === emailPopup) {
    emailPopup.style.display = 'none';
  }
});

// Handle form submission
emailForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const email = emailForm.email.value;

  // });

  // Redirect after submission
  window.location.href = "https://yhuniquemedia-code.github.io/study-habit-systems/"; // <-- REPLACE with your sales page
});
</script>
